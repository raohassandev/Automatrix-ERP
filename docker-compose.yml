services:
  db:
    image: postgres:16
    container_name: automatrix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: automatrix
      POSTGRES_PASSWORD: automatrix_password
      POSTGRES_DB: automatrix_erp
    ports:
      - "5432:5432"
    volumes:
      - automatrix_pgdata:/var/lib/postgresql/data

volumes:
  automatrix_pgdata:
